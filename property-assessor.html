<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1e293b">
<title>Property Assessor</title>
<style>
  :root {
    --bg:#f1f5f9; --card:#fff; --ink:#1e293b; --ink-soft:#64748b; --ink-faint:#94a3b8;
    --line:#e2e8f0; --slate:#1e293b; --slate-2:#334155;
    --immediate:#e11d48; --immediate-bg:#fff1f2; --immediate-line:#fecdd3;
    --medium:#d97706; --medium-bg:#fffbeb; --medium-line:#fde68a;
    --long:#059669; --long-bg:#ecfdf5; --long-line:#a7f3d0; --accent:#0ea5e9;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:16px; line-height:1.5; padding-bottom:env(safe-area-inset-bottom); }
  button { font-family:inherit; cursor:pointer; border:none; background:none; }
  input { font-family:inherit; font-size:16px; }
  .topbar { background:var(--slate); color:#fff; padding:calc(env(safe-area-inset-top) + 14px) 16px 14px; position:sticky; top:0; z-index:50; }
  .topbar-row { display:flex; align-items:center; justify-content:space-between; gap:12px; max-width:760px; margin:0 auto; }
  .topbar h1 { font-size:17px; font-weight:700; margin:0; }
  .topbar .sub { font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:#94a3b8; margin:0 0 1px; }
  .iconbtn { background:rgba(255,255,255,.12); color:#fff; border-radius:9px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
  .iconbtn:active { background:rgba(255,255,255,.25); }
  .wrap { max-width:760px; margin:0 auto; padding:16px 14px 60px; }
  .prop-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; -webkit-overflow-scrolling:touch; }
  .prop-chip { flex-shrink:0; background:var(--card); border:1.5px solid var(--line); color:var(--ink-soft); border-radius:20px; padding:7px 14px; font-size:13px; font-weight:600; white-space:nowrap; }
  .prop-chip.active { background:var(--slate); border-color:var(--slate); color:#fff; }
  .prop-chip.add { border-style:dashed; color:var(--accent); border-color:var(--accent); }
  .addr-card { background:var(--card); border-radius:14px; padding:14px 16px; margin-bottom:14px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .addr-card label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--ink-faint); margin-bottom:4px; }
  .addr-card input { width:100%; border:none; outline:none; font-size:19px; font-weight:700; color:var(--ink); padding:0; }
  .addr-card input::placeholder { color:#cbd5e1; }
  .section-head { font-size:12px; text-transform:uppercase; letter-spacing:1.4px; color:var(--ink-faint); font-weight:700; margin:22px 4px 10px; }
  .task { background:var(--card); border-radius:14px; margin-bottom:10px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.04); border:1.5px solid transparent; transition:border-color .15s; }
  .task.on { border-color:var(--slate-2); }
  .task-head { display:flex; align-items:center; gap:12px; padding:14px 16px; }
  .task-head:active { background:#f8fafc; }
  .task-title { flex:1; font-weight:600; font-size:15px; }
  .task-title small { display:block; font-weight:500; font-size:12px; color:var(--ink-faint); margin-top:1px; }
  .check { width:24px; height:24px; border-radius:7px; border:2px solid #cbd5e1; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; font-weight:800; }
  .task.on .check { background:var(--slate); border-color:var(--slate); }
  .task-badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; }
  .badge-Immediate { background:var(--immediate-bg); color:var(--immediate); }
  .badge-Medium-term { background:var(--medium-bg); color:var(--medium); }
  .badge-Long-term { background:var(--long-bg); color:var(--long); }
  .task-body { padding:0 16px 16px; display:none; }
  .task.on .task-body { display:block; }
  .field-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-faint); font-weight:700; margin:14px 0 6px; }
  .pills { display:flex; flex-wrap:wrap; gap:7px; }
  .pill { border:1.5px solid var(--line); border-radius:9px; padding:8px 12px; font-size:13px; font-weight:600; color:var(--ink-soft); background:#fff; flex:1; min-width:fit-content; text-align:center; white-space:nowrap; }
  .pill.sel-Immediate { background:var(--immediate); border-color:var(--immediate); color:#fff; }
  .pill.sel-Medium-term { background:var(--medium); border-color:var(--medium); color:#fff; }
  .pill.sel-Long-term { background:var(--long); border-color:var(--long); color:#fff; }
  .tier-row { display:flex; flex-wrap:wrap; gap:7px; }
  .tier { border:1.5px solid var(--line); border-radius:9px; padding:8px 11px; font-size:13px; font-weight:600; color:var(--ink-soft); background:#fff; text-align:left; }
  .tier.sel { background:#eff6ff; border-color:var(--accent); color:#0369a1; }
  .tier .rng { display:block; font-size:11px; font-weight:500; color:var(--ink-faint); margin-top:1px; }
  .tier.sel .rng { color:#0ea5e9; }
  .est-wrap { margin-top:10px; background:#f8fafc; border-radius:10px; padding:12px; }
  .est-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .est-input-wrap { display:flex; align-items:center; background:#fff; border:1.5px solid var(--line); border-radius:9px; padding:6px 10px; }
  .est-input-wrap .d { color:var(--ink-faint); font-weight:700; margin-right:2px; }
  .est-input-wrap input { width:90px; border:none; outline:none; font-size:16px; font-weight:700; color:var(--ink); padding:0; background:transparent; }
  .quick { display:flex; gap:6px; }
  .qbtn { border:1.5px solid var(--line); background:#fff; border-radius:8px; padding:6px 10px; font-size:12px; font-weight:600; color:var(--ink-soft); }
  .qbtn.on { background:var(--slate); border-color:var(--slate); color:#fff; }
  .est-hint { font-size:11px; color:var(--ink-faint); margin-top:7px; }
  .note-input { width:100%; margin-top:12px; border:1.5px solid var(--line); border-radius:9px; padding:10px 12px; font-size:14px; color:var(--ink); outline:none; resize:vertical; min-height:38px; }
  .note-input:focus { border-color:var(--accent); }
  .sum-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .sum-card { border-radius:13px; padding:13px 12px; border:1.5px solid; }
  .sum-card.Immediate { background:var(--immediate-bg); border-color:var(--immediate-line); }
  .sum-card.Medium-term { background:var(--medium-bg); border-color:var(--medium-line); }
  .sum-card.Long-term { background:var(--long-bg); border-color:var(--long-line); }
  .sum-card.empty { background:var(--card); border-color:var(--line); opacity:.55; }
  .sum-card .lab { font-size:10px; text-transform:uppercase; letter-spacing:.6px; font-weight:800; }
  .sum-card.Immediate .lab { color:var(--immediate); }
  .sum-card.Medium-term .lab { color:var(--medium); }
  .sum-card.Long-term .lab { color:var(--long); }
  .sum-card .amt { font-size:19px; font-weight:800; margin:5px 0 2px; }
  .sum-card .cnt { font-size:11px; color:var(--ink-soft); }
  .total-bar { background:var(--slate); color:#fff; border-radius:14px; padding:16px 18px; margin-top:10px; display:flex; align-items:center; justify-content:space-between; }
  .total-bar .lab { font-size:11px; text-transform:uppercase; letter-spacing:1.4px; color:#94a3b8; margin:0 0 2px; }
  .total-bar .amt { font-size:24px; font-weight:800; }
  .total-bar .cnt { font-size:12px; color:#cbd5e1; text-align:right; }
  .disclaimer { font-size:11px; color:var(--ink-faint); margin:16px 4px 0; line-height:1.5; }
  .actions { display:flex; gap:10px; margin-top:18px; }
  .btn { flex:1; border-radius:11px; padding:14px; font-size:14px; font-weight:700; text-align:center; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:active { background:#0284c7; }
  .btn-ghost { background:var(--card); color:var(--ink-soft); border:1.5px solid var(--line); }
  .saved-flash { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--slate); color:#fff; padding:10px 20px; border-radius:24px; font-size:13px; font-weight:600; opacity:0; transition:opacity .2s; pointer-events:none; z-index:100; }
  .saved-flash.show { opacity:1; }
  @media print {
    .topbar,.prop-bar,.actions,.iconbtn,.no-print { display:none !important; }
    body { background:#fff; }
    .task:not(.on) { display:none; }
    .task-body { display:block !important; }
    .total-bar { background:#fff; color:#000; border:2px solid #000; }
    .total-bar .lab,.total-bar .cnt { color:#333; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-row">
    <div>
      <p class="sub">Property Assessor</p>
      <h1 id="topAddr">No property selected</h1>
    </div>
    <button class="iconbtn" onclick="window.print()" title="Print / Save PDF">&#9112;</button>
  </div>
</div>
<div class="wrap">
  <div class="prop-bar" id="propBar"></div>
  <div class="addr-card">
    <label>Property address</label>
    <input id="addr" placeholder="e.g. 12 Example St, Northcote" oninput="onAddr(this.value)">
  </div>
  <div class="section-head">Renovation &amp; repair checklist</div>
  <div id="tasks"></div>
  <div class="section-head">Summary</div>
  <div class="sum-grid" id="sumGrid"></div>
  <div class="total-bar" id="totalBar"></div>
  <p class="disclaimer" id="disclaimer"></p>
  <div class="actions no-print">
    <button class="btn btn-ghost" onclick="deleteProp()">Delete property</button>
    <button class="btn btn-primary" onclick="window.print()">Save as PDF</button>
  </div>
</div>
<div class="saved-flash" id="flash">Saved</div>
<script>
var URGENCY = ["Immediate","Medium-term","Long-term"];
// Ranges calibrated for a smaller 2-bedroom inner-north period home (Vic/Edwardian). [low, high] AUD, 2026 Melbourne installed.
var ITEMS = [
  { id:"heating", label:"Heating / cooling", tiers:[
    ["split","Split system(s)",2000,7000],["ducted","Ducted / central",9000,16000]] },
  { id:"insulation", label:"Insulation", tiers:[
    ["ceiling","Ceiling",800,2000],["underfloor","Underfloor",1000,2500],["wall","Wall (retrofit)",1200,3500]] },
  { id:"glazing", label:"Double glazing", tiers:[
    ["partial","Partial (key rooms)",2500,8000],["full","Full house",12000,28000]] },
  { id:"garage", label:"Garage / storage", tiers:[
    ["shed_s","Small shed (kit)",300,2500],["shed_l","Shed / office with power",4000,12000],["studio","Garage / large workshop",15000,35000]] },
  { id:"bathroom", label:"Bathroom refit", tiers:[
    ["cosmetic","Cosmetic refresh",5000,12000],["full","Full refit",14000,30000]] },
  { id:"reconfig", label:"Room reconfiguration", tiers:[
    ["wall","Remove / add wall(s)",1500,8000],["kitchen","Kitchen reorientation",15000,35000],["major","Major layout change",25000,70000]] },
  { id:"outdoor", label:"Open living space to outside", tiers:[
    ["sliding","Sliding doors",5000,14000],["bifold","Bifold doors",8000,22000]] },
  { id:"skylight", label:"Skylight", tiers:[
    ["single","Single skylight",800,3000],["multi","Multiple / roof window",3000,9000]] },
  { id:"landscape", label:"Landscaping", tiers:[
    ["tidy","Tidy / replant",2000,8000],["redesign","Full redesign",12000,40000]] },
  { id:"subfloor", label:"Subfloor / foundations", tiers:[
    ["level","Levelling / minor",3000,7000],["reblock","Reblocking",7000,16000],["restump","Full restumping",12000,25000]] },
  { id:"solar", label:"Solar / battery", tiers:[
    ["solar","Solar panels only",4000,8000],["battery","Solar + battery",9000,20000]] },
  { id:"roof", label:"Roof", tiers:[
    ["repair","Repair / restoration",1000,7000],["replace","Full replacement",12000,30000]] },
  { id:"electrical", label:"Electrical", tiers:[
    ["partial","Partial (RCDs, switchboard)",2000,5500],["rewire","Full rewire",7000,16000]] },
  { id:"extpaint", label:"External painting", tiers:[
    ["touch","Touch-up",1000,3000],["full","Full repaint",4000,12000]] },
  { id:"intpaint", label:"Internal painting", tiers:[
    ["partial","Select rooms",800,3000],["full","Whole house",2500,6500]] },
  { id:"floors", label:"Floors", tiers:[
    ["boards","Lift carpet, finish boards",2000,6000],["laminate","Laminate / engineered",3000,9000],["tile","Tiling",3000,10000]] }
];

function tierData(itemId, tid){ var it=ITEMS.find(function(i){return i.id===itemId;}); if(!it)return null;
  var t=it.tiers.find(function(x){return x[0]===tid;}); return t?{id:t[0],label:t[1],low:t[2],high:t[3]}:null; }
function mid(low,high){ return Math.round((low+high)/2); }

var store = { properties:{}, current:null };
var storageOK = true;
function load(){ try{ var raw=localStorage.getItem("propAssessor"); if(raw) store=JSON.parse(raw);}catch(e){storageOK=false;}
  if(!store.properties) store.properties={}; }
function save(){ try{ localStorage.setItem("propAssessor",JSON.stringify(store)); }catch(e){ storageOK=false; } }
function flash(){ var f=document.getElementById("flash"); f.textContent=storageOK?"Saved":"Saved (this session only)"; f.classList.add("show"); clearTimeout(f._t); f._t=setTimeout(function(){f.classList.remove("show");},1200); }

function newProp(){ var id="p"+Date.now(); store.properties[id]={addr:"",tasks:{}}; store.current=id; save(); render(); document.getElementById("addr").focus(); }
function cur(){ return store.properties[store.current]; }
function deleteProp(){ if(!store.current)return; if(!confirm("Delete this property assessment?"))return; delete store.properties[store.current]; var k=Object.keys(store.properties); store.current=k.length?k[0]:null; save(); render(); }
function switchProp(id){ store.current=id; save(); render(); }

function onAddr(v){ if(!cur())return; cur().addr=v; document.getElementById("topAddr").textContent=v||"Untitled property"; renderPropBar(); save(); }
function num(v){ return parseFloat(String(v).replace(/[^0-9.]/g,""))||0; }

function toggleTask(itemId){ var t=cur().tasks; if(t[itemId]){ delete t[itemId]; } else { t[itemId]={tier:null,urgency:null,est:null,note:""}; } save(); render(); }
function setTier(itemId,tid){ var t=cur().tasks[itemId]; if(!t)return;
  if(t.tier===tid){ t.tier=null; t.est=null; } else { t.tier=tid; var d=tierData(itemId,tid); t.est=mid(d.low,d.high); }
  save(); render(); }
function setUrgency(itemId,u){ var t=cur().tasks[itemId]; if(!t)return; t.urgency=(t.urgency===u)?null:u; save(); render(); }
function setEst(itemId,val){ var t=cur().tasks[itemId]; if(!t)return; t.est=val; save(); render(); }
function onEstInput(itemId,val){ var t=cur().tasks[itemId]; if(!t)return; t.est=num(val); save(); renderSummary(); }
function setNote(itemId,val){ var t=cur().tasks[itemId]; if(t){ t.note=val; save(); } }

function fmt(n){ return "$"+Math.round(n).toLocaleString("en-AU"); }

function renderPropBar(){ var bar=document.getElementById("propBar"); bar.innerHTML="";
  Object.keys(store.properties).forEach(function(id){ var p=store.properties[id]; var b=document.createElement("button");
    b.className="prop-chip"+(id===store.current?" active":""); b.textContent=p.addr?p.addr.split(",")[0]:"Untitled"; b.onclick=function(){switchProp(id);}; bar.appendChild(b); });
  var add=document.createElement("button"); add.className="prop-chip add"; add.textContent="+ Add property"; add.onclick=newProp; bar.appendChild(add); }

function renderTasks(){ var wrap=document.getElementById("tasks"); wrap.innerHTML=""; var t=cur().tasks;
  ITEMS.forEach(function(item){
    var on=!!t[item.id]; var data=t[item.id]||{};
    var card=document.createElement("div"); card.className="task"+(on?" on":"");
    var head=document.createElement("div"); head.className="task-head"; head.onclick=function(){toggleTask(item.id);};
    var badge=""; if(on&&data.urgency) badge='<span class="task-badge badge-'+data.urgency.replace(" ","-")+'">'+data.urgency+'</span>';
    var sub=(on&&data.est!=null&&data.tier)?'<small>'+fmt(data.est)+'</small>':'';
    head.innerHTML='<div class="check">'+(on?"&#10003;":"")+'</div><div class="task-title">'+item.label+sub+'</div>'+badge;
    card.appendChild(head);
    if(on){
      var body=document.createElement("div"); body.className="task-body";
      var html='<div class="field-label">Solution</div><div class="tier-row">';
      item.tiers.forEach(function(tr){ var d={id:tr[0],label:tr[1],low:tr[2],high:tr[3]}; var sel=(data.tier===d.id)?"sel":"";
        html+='<button class="tier '+sel+'" onclick="setTier(\''+item.id+'\',\''+d.id+'\')">'+d.label+'<span class="rng">'+fmt(d.low)+'&ndash;'+fmt(d.high)+'</span></button>'; });
      html+='</div>';
      if(data.tier){ var d=tierData(item.id,data.tier); var lo=d.low,md=mid(d.low,d.high),hi=d.high;
        var which=(data.est===lo)?"lo":(data.est===hi)?"hi":(data.est===md)?"md":"";
        html+='<div class="est-wrap"><div class="est-top"><div class="quick">';
        html+='<button class="qbtn '+(which==="lo"?"on":"")+'" onclick="setEst(\''+item.id+'\','+lo+')">Low</button>';
        html+='<button class="qbtn '+(which==="md"?"on":"")+'" onclick="setEst(\''+item.id+'\','+md+')">Typical</button>';
        html+='<button class="qbtn '+(which==="hi"?"on":"")+'" onclick="setEst(\''+item.id+'\','+hi+')">High</button></div>';
        html+='<div class="est-input-wrap"><span class="d">$</span><input inputmode="numeric" value="'+(data.est!=null?num(data.est).toLocaleString("en-AU"):"")+'" onchange="onEstInput(\''+item.id+'\',this.value)"></div></div>';
        html+='<div class="est-hint">Typical installed range '+fmt(d.low)+'&ndash;'+fmt(d.high)+'. Adjust to suit the property.</div></div>';
      }
      html+='<div class="field-label">Urgency</div><div class="pills">';
      URGENCY.forEach(function(u){ var sel=(data.urgency===u)?("sel-"+u.replace(" ","-")):""; html+='<button class="pill '+sel+'" onclick="setUrgency(\''+item.id+'\',\''+u+'\')">'+u+'</button>'; });
      html+='</div>';
      body.innerHTML=html;
      var note=document.createElement("textarea"); note.className="note-input"; note.placeholder="Notes (what you saw, who to ask)..."; note.value=data.note||"";
      note.oninput=function(e){ setNote(item.id,e.target.value); };
      body.appendChild(note);
      card.appendChild(body);
    }
    wrap.appendChild(card);
  });
}

function buckets(){ var b={}; URGENCY.forEach(function(u){ b[u]={items:[],total:0,uncosted:0}; });
  var t=cur().tasks;
  ITEMS.forEach(function(item){ var d=t[item.id]; if(!d||!d.urgency)return;
    b[d.urgency].items.push(item.label);
    if(d.tier&&d.est!=null) b[d.urgency].total+=num(d.est); else b[d.urgency].uncosted++; });
  return b; }

function renderSummary(){ var grid=document.getElementById("sumGrid"); var b=buckets(); grid.innerHTML="";
  URGENCY.forEach(function(u){ var data=b[u]; var has=data.items.length>0; var div=document.createElement("div");
    div.className="sum-card "+(has?u.replace(" ","-"):"empty");
    if(has){ div.innerHTML='<div class="lab">'+u+'</div><div class="amt">'+(data.total>0?fmt(data.total):"&mdash;")+'</div><div class="cnt">'+data.items.length+' item'+(data.items.length!==1?"s":"")+(data.uncosted?', '+data.uncosted+' TBC':"")+'</div>'; }
    else { div.innerHTML='<div class="lab">'+u+'</div><div class="cnt" style="margin-top:6px">None</div>'; }
    grid.appendChild(div); });
  var grand=URGENCY.reduce(function(s,u){return s+b[u].total;},0);
  var gu=URGENCY.reduce(function(s,u){return s+b[u].uncosted;},0);
  var gi=URGENCY.reduce(function(s,u){return s+b[u].items.length;},0);
  var tb=document.getElementById("totalBar");
  tb.innerHTML='<div><p class="lab">Total renovation estimate</p><div class="amt">'+(grand>0?fmt(grand):"&mdash;")+(gu?"+":"")+'</div></div><div class="cnt">'+gi+' item'+(gi!==1?"s":"")+' flagged'+(gu?'<br>'+gu+' not yet costed':"")+'</div>';
}

function render(){
  if(!store.current||!store.properties[store.current]){ var k=Object.keys(store.properties); if(k.length) store.current=k[0]; }
  renderPropBar();
  document.getElementById("disclaimer").innerHTML="Cost ranges are 2026 Melbourne installed figures, calibrated for a smaller two-bedroom inner-north period home and drawn from current trade pricing guides. They are indicative planning estimates for comparing properties, not quotes. Get site-specific quotes before relying on them.";
  var sel=".addr-card,.section-head,#tasks,.sum-grid,.total-bar,.disclaimer,.actions";
  if(!store.current){
    document.getElementById("topAddr").textContent="No property yet";
    document.querySelectorAll(sel).forEach(function(e){e.style.display="none";});
    if(!document.getElementById("emptyState")){ var es=document.createElement("div"); es.id="emptyState"; es.style.cssText="text-align:center;padding:50px 20px;color:#94a3b8";
      es.innerHTML='<p style="font-size:15px">No properties yet.</p><button class="btn btn-primary" style="max-width:220px;margin:10px auto 0" onclick="newProp()">+ Add your first property</button>'; document.querySelector(".wrap").appendChild(es); }
    return;
  }
  var es=document.getElementById("emptyState"); if(es) es.remove();
  document.querySelectorAll(sel).forEach(function(e){e.style.display="";});
  var p=cur();
  document.getElementById("addr").value=p.addr||"";
  document.getElementById("topAddr").textContent=p.addr||"Untitled property";
  renderTasks(); renderSummary();
}

load();
if(Object.keys(store.properties).length===0){ var id="p"+Date.now(); store.properties[id]={addr:"",tasks:{}}; store.current=id; }
render();
</script>
</body>
</html>
